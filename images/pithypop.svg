<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200">
  <defs>
    <linearGradient id="gradPithy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <linearGradient id="gradPop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0EA5A4"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)" 
     font-family="Fredoka, Baloo, Nunito, Arial Rounded MT Bold, sans-serif" 
     font-weight="700"
     font-size="150"
     letter-spacing="-2">

    <text x="70" y="140" fill="url(#gradPithy)">
      Pithy
    </text>

    <text x="410" y="140" fill="url(#gradPop)">
      Pop
    </text>

  </g>
</svg>
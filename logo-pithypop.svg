  <circle cx="364" cy="138" r="10" fill="#fff"/>
  </g>
</g>

  <!-- mejillas -->
  <g transform="translate(0,-10)">
  <circle cx="130" cy="260" r="22" fill="#F7A98C"/>
  <circle cx="382" cy="260" r="22" fill="#F7A98C"/>
  </g>
  <!-- sonrisa -->
  <g transform="translate(0,-30)">
  <path d="M200 285 Q256 325 312 285" 

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="PithyPop logo">
  <defs>
    <linearGradient id="face" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8BEA4E"/>
      <stop offset="100%" stop-color="#5BCB3A"/>
    </linearGradient>
  </defs>
  
<g transform="translate(0,15)">
  
  <!-- Borde ojos -->
<g transform="translate(0,5)">
  

  <circle cx="160" cy="150" r="72" fill="#1E8E3E"/>
  </g>
  <g transform="translate(0,5)">  
  <circle cx="352" cy="150" r="72" fill="#1E8E3E"/>
  </g>
</g>
  <!-- cabeza -->
<ellipse cx="256" cy="260" rx="180" ry="130" fill="url(#face)" stroke="#1E8E3E" stroke-width="14"/>

  <!-- ojos -->
  
<g transform="translate(0,10)">
  
  <circle cx="160" cy="150" r="60" fill="#F5F5F0"/>
  <circle cx="352" cy="150" r="60" fill="#F5F5F0"/>

  <circle cx="160" cy="150" r="40" fill="#2F3E3B"/>
  <circle cx="352" cy="150" r="40" fill="#2F3E3B"/>

